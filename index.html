<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEVCLUB - Universo da Programação</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js" defer></script>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">DEVCLUB</div>
            
            <nav class="nav">
                <a href="#formacoes">Formações</a>
                <a href="#empresas">Empresas</a>
                <a href="#tecnologias">Tecnologias</a>
                <a href="#tutoriais">Tutoriais</a>
            </nav>
            
            <div class="nav-right">
                <a href="#area-aluno">Área do Aluno</a>
                <button class="btn-signin">Sign In</button>
            </div>
            
            <button class="menu-toggle">☰</button>
        </div>
    </header>

    <main>
        <section class="hero">
            <svg id="connections" class="connections"></svg>
            
            <div class="hero-content">
                <div class="devclub-reveal">DEVCLUB</div>
                
                <div class="content">
                    <h1>UNIVERSO<br>DA PROGRAMAÇÃO</h1>
                    <p>Um organismo vivo em contínua evolução</p>
                </div>

                <div class="tech tech-html">
                    <div class="tech-dot"></div>
                    <div class="tech-label">HTML</div>
                </div>
                
                <div class="tech tech-css">
                    <div class="tech-dot"></div>
                    <div class="tech-label">CSS</div>
                </div>
                
                <div class="tech tech-javascript">
                    <div class="tech-dot"></div>
                    <div class="tech-label">JavaScript</div>
                </div>
                
                <div class="tech tech-ai">
                    <div class="tech-dot"></div>
                    <div class="tech-label">IA</div>
                </div>
                
                <div class="tech tech-react">
                    <div class="tech-dot"></div>
                    <div class="tech-label">React</div>
                </div>
                
                <div class="tech tech-typescript">
                    <div class="tech-dot"></div>
                    <div class="tech-label">TypeScript</div>
                </div>
                
                <div class="tech tech-nodejs">
                    <div class="tech-dot"></div>
                    <div class="tech-label">Node.js</div>
                </div>
                
                <div class="tech tech-python">
                    <div class="tech-dot"></div>
                    <div class="tech-label">Python</div>
                </div>
            </div>

            <div class="hero-cta">
                <button class="btn-primary">Começar Agora</button>
                <p class="scroll-indicator">SCROLL</p>
            </div>
        </section>
    </main>
</body>
</html>
